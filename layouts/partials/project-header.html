{{/* Project Header Partial */}}

<header class="project-header">

  {{/* Project official title */}}
  {{ with .Params.project_motivation }}
    <strong class="project-motivation">
     {{ . }}
    </strong>
  {{ end }}


  {{/* Abstract / summary */}}
  {{ with .Params.project_abstract }}
    <p class="project-abstract">
      {{ . }}
    </p>
  {{ end }}



</header>
